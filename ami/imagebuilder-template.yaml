AWSTemplateFormatVersion: "2010-09-09"
Description: Diogenes GPU AMI pipeline (EC2 Image Builder)

Parameters:
  Environment:
    Type: String
    Default: dev
  BaseAmiId:
    Type: String
    Description: Parent/base AMI for image recipe
  BuilderSubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet for Image Builder temporary instances
  BuilderSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security group for Image Builder temporary instances
  BuilderInstanceType:
    Type: String
    Default: c5.2xlarge
    Description: Instance type used by Image Builder during AMI creation (needs network bandwidth for large downloads)
  ImageVersion:
    Type: String
    Default: 1.2.0
    Description: Semantic version for Image Builder component/recipe (bump on recipe changes)
  PipelineStatus:
    Type: String
    Default: DISABLED
    AllowedValues:
      - ENABLED
      - DISABLED
  PrimaryModelId:
    Type: String
    Default: Qwen/Qwen3.5-27B-FP8
    Description: Primary model to pre-download into the AMI
  SmallModelId:
    Type: String
    Default: Qwen/Qwen3.5-4B
    Description: Small fast model to pre-download into the AMI

Resources:
  ImageBuilderRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub diogenes-imagebuilder-role-${Environment}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
                - imagebuilder.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/EC2InstanceProfileForImageBuilder
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: LifecycleImageCleanup
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ec2:DescribeImages
                  - ec2:DeregisterImage
                  - ec2:DeleteSnapshot
                  - ec2:DescribeSnapshots
                  - imagebuilder:GetImage
                  - imagebuilder:ListImagePipelineImages
                Resource: "*"

  ImageBuilderInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub diogenes-imagebuilder-profile-${Environment}
      Roles:
        - !Ref ImageBuilderRole

  DiogenesSetupComponent:
    Type: AWS::ImageBuilder::Component
    Properties:
      Name: !Sub diogenes-setup-${Environment}
      Platform: Linux
      Version: !Ref ImageVersion
      Description: Install vLLM directly via pip, CloudWatch agent, pre-download models
      Data: !Sub |
        name: DiogenesSetup
        description: Install runtime dependencies for Diogenes GPU nodes.
        schemaVersion: 1.0
        phases:
          - name: build
            steps:
              - name: SetupDiogenes
                action: ExecuteBash
                inputs:
                  commands:
                    - |
                      set -euxo pipefail
                      trap 'echo "FAILED at line ${!LINENO}: ${!BASH_COMMAND}" >&2' ERR
                      export DEBIAN_FRONTEND=noninteractive
                      apt-get update -y
                      apt-get install -y --no-install-recommends ca-certificates curl git python3 python3-pip python3-venv

                      # Install CloudWatch agent for persistent log streaming
                      curl -sO https://s3.amazonaws.com/amazoncloudwatch-agent/ubuntu/amd64/latest/amazon-cloudwatch-agent.deb
                      dpkg -i amazon-cloudwatch-agent.deb
                      rm amazon-cloudwatch-agent.deb

                      # Install vLLM directly (no Docker needed — base AMI has CUDA drivers)
                      python3 -m venv /opt/vllm-env
                      /opt/vllm-env/bin/pip install --upgrade pip
                      /opt/vllm-env/bin/pip install vllm huggingface-hub

                      # Pre-compile Python bytecode to speed up cold-start import time
                      /opt/vllm-env/bin/python -m compileall -q /opt/vllm-env/lib/ 2>/dev/null || true

                      # Pre-download model weights into /opt/models so cold starts don't need HuggingFace
                      mkdir -p /opt/models
                      echo "Downloading primary model: ${PrimaryModelId}"
                      HF_HOME=/opt/models /opt/vllm-env/bin/python -c "from huggingface_hub import snapshot_download; snapshot_download('${PrimaryModelId}')"
                      echo "Downloading small model: ${SmallModelId}"
                      HF_HOME=/opt/models /opt/vllm-env/bin/python -c "from huggingface_hub import snapshot_download; snapshot_download('${SmallModelId}')"

                      cat > /etc/diogenes-model.env <<'EOF'
                      MODEL_NAME=
                      VLLM_ARGS=
                      EOF
                      install -d -m 0755 /opt/diogenes
                      cat > /opt/diogenes/start_vllm.sh <<'EOF'
                      #!/usr/bin/env bash
                      set -euo pipefail
                      source /etc/diogenes-model.env
                      if [[ -z "${!MODEL_NAME:-}" ]]; then
                        echo "MODEL_NAME is required in /etc/diogenes-model.env"
                        exit 1
                      fi
                      export HF_HOME=/opt/models
                      exec /opt/vllm-env/bin/vllm serve "$MODEL_NAME" \
                        --host 0.0.0.0 --port 8000 \
                        ${!VLLM_ARGS:-}
                      EOF
                      chmod +x /opt/diogenes/start_vllm.sh
                      cat > /etc/systemd/system/vllm.service <<'EOF'
                      [Unit]
                      Description=Diogenes vLLM server
                      After=network-online.target
                      Wants=network-online.target
                      [Service]
                      Type=simple
                      Restart=always
                      RestartSec=5
                      EnvironmentFile=/etc/diogenes-model.env
                      ExecStart=/opt/diogenes/start_vllm.sh
                      StandardOutput=append:/var/log/vllm.log
                      StandardError=append:/var/log/vllm.log
                      [Install]
                      WantedBy=multi-user.target
                      EOF
                      systemctl daemon-reload
                      echo "DIOGENES_BOOTSTRAP_DONE" > /var/log/diogenes-bootstrap.done

  DiogenesImageRecipe:
    Type: AWS::ImageBuilder::ImageRecipe
    Properties:
      Name: !Sub diogenes-gpu-recipe-${Environment}
      Version: !Ref ImageVersion
      ParentImage: !Ref BaseAmiId
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 250
            VolumeType: gp3
            DeleteOnTermination: true
      Components:
        - ComponentArn: !Ref DiogenesSetupComponent

  DiogenesInfrastructureConfig:
    Type: AWS::ImageBuilder::InfrastructureConfiguration
    Properties:
      Name: !Sub diogenes-gpu-infra-${Environment}
      InstanceProfileName: !Ref ImageBuilderInstanceProfile
      InstanceTypes:
        - !Ref BuilderInstanceType
      SubnetId: !Ref BuilderSubnetId
      SecurityGroupIds:
        - !Ref BuilderSecurityGroupId
      TerminateInstanceOnFailure: true

  DiogenesDistributionConfig:
    Type: AWS::ImageBuilder::DistributionConfiguration
    Properties:
      Name: !Sub diogenes-gpu-dist-${Environment}
      Distributions:
        - Region: !Ref AWS::Region
          AmiDistributionConfiguration:
            Name: !Sub diogenes-gpu-{{ imagebuilder:buildDate }}
            Description: !Sub Diogenes GPU AMI (${Environment})
            AmiTags:
              Project: diogenes
              Environment: !Ref Environment

  DiogenesImagePipeline:
    Type: AWS::ImageBuilder::ImagePipeline
    Properties:
      Name: !Sub diogenes-gpu-pipeline-${Environment}
      Status: !Ref PipelineStatus
      ImageRecipeArn: !Ref DiogenesImageRecipe
      InfrastructureConfigurationArn: !Ref DiogenesInfrastructureConfig
      DistributionConfigurationArn: !Ref DiogenesDistributionConfig
      ImageTestsConfiguration:
        ImageTestsEnabled: false

  DiogenesLifecyclePolicy:
    Type: AWS::ImageBuilder::LifecyclePolicy
    Properties:
      Name: !Sub diogenes-ami-lifecycle-${Environment}
      Status: ENABLED
      ExecutionRole: !GetAtt ImageBuilderRole.Arn
      ResourceType: AMI_IMAGE
      ResourceSelection:
        Recipes:
          - Name: !Sub diogenes-gpu-recipe-${Environment}
            SemanticVersion: "*.*.*"
      PolicyDetails:
        - Action:
            Type: DELETE
          Filter:
            Type: COUNT
            Value: 2

Outputs:
  ImagePipelineArn:
    Description: ARN of the Diogenes Image Builder pipeline
    Value: !Ref DiogenesImagePipeline
  ImageRecipeArn:
    Value: !Ref DiogenesImageRecipe
