AWSTemplateFormatVersion: "2010-09-09"
Description: ZeroLLM GPU AMI pipeline (EC2 Image Builder)

Parameters:
  Environment:
    Type: String
    Default: dev
  BaseAmiId:
    Type: String
    Description: Parent/base AMI for image recipe
  BuilderSubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet for Image Builder temporary instances
  BuilderSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security group for Image Builder temporary instances
  BuilderInstanceType:
    Type: String
    Default: c5.2xlarge
    Description: Instance type used by Image Builder during AMI creation (needs network bandwidth for large downloads)
  ImageVersion:
    Type: String
    Default: 1.3.18
    Description: Semantic version for Image Builder component/recipe (bump on recipe changes)
  LlamaCppDockerImage:
    Type: String
    Default: ghcr.io/ggml-org/llama.cpp:server-cuda13-b9404
    Description: llama.cpp server image to bake into GPU AMIs
  PipelineStatus:
    Type: String
    Default: DISABLED
    AllowedValues:
      - ENABLED
      - DISABLED

Resources:
  ImageBuilderRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub zerollm-imagebuilder-role-${Environment}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
                - imagebuilder.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/EC2InstanceProfileForImageBuilder
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: LifecycleImageCleanup
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ec2:DescribeImages
                  - ec2:DeregisterImage
                  - ec2:DeleteSnapshot
                  - ec2:DescribeSnapshots
                  - imagebuilder:GetImage
                  - imagebuilder:ListImagePipelineImages
                Resource: "*"

  ImageBuilderInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub zerollm-imagebuilder-profile-${Environment}
      Roles:
        - !Ref ImageBuilderRole

  ZeroLLMSetupComponent:
    Type: AWS::ImageBuilder::Component
    Properties:
      Name: !Sub zerollm-setup-${Environment}
      Platform: Linux
      Version: !Ref ImageVersion
      Description: Install llama.cpp (Docker), CloudWatch agent, NVIDIA toolkit. Models are downloaded from S3 at instance boot — not baked into the AMI.
      Data: !Sub |
        name: ZeroLLMSetup
        description: Install llama.cpp (Docker), CloudWatch agent, NVIDIA toolkit. Models downloaded from S3 at boot.
        schemaVersion: 1.0
        phases:
          - name: build
            steps:
              - name: SetupZeroLLM
                action: ExecuteBash
                inputs:
                  commands:
                    - |
                      set -euxo pipefail
                      trap 'echo "FAILED at line ${!LINENO}: ${!BASH_COMMAND}" >&2' ERR
                      export DEBIAN_FRONTEND=noninteractive
                      apt-get update -y
                      apt-get install -y --no-install-recommends \
                        ca-certificates curl \
                        python3 python3-pip python3-venv

                      # Disable Ubuntu background services that add 3-4 min to every boot.
                      # This is a single-purpose inference node — package updates have no value here.
                      systemctl disable unattended-upgrades apt-daily.timer apt-daily-upgrade.timer apt-news.service apt-daily.service apt-daily-upgrade.service 2>/dev/null || true
                      apt-get remove -y --purge unattended-upgrades 2>/dev/null || true
                      # PackageKit is a desktop package-management daemon — unused on a server
                      apt-get remove -y --purge packagekit 2>/dev/null || true

                      cat > /usr/local/sbin/zerollm-firstboot-cleanup.sh <<'EOF'
                      #!/usr/bin/env bash
                      set -euo pipefail
                      export DEBIAN_FRONTEND=noninteractive
                      tmpdir="$(mktemp -d)"
                      trap 'rm -rf "$tmpdir"' EXIT
                      curl -fsSL -o "$tmpdir/amazon-ssm-agent.deb" https://s3.us-east-2.amazonaws.com/amazon-ssm-us-east-2/latest/debian_amd64/amazon-ssm-agent.deb
                      systemctl disable unattended-upgrades apt-daily.timer apt-daily-upgrade.timer apt-news.service apt-daily.service apt-daily-upgrade.service 2>/dev/null || true
                      apt-get remove -y --purge unattended-upgrades snapd packagekit 2>/dev/null || true
                      apt-get autoremove -y 2>/dev/null || true
                      dpkg -i "$tmpdir/amazon-ssm-agent.deb"
                      systemctl enable --now amazon-ssm-agent || true
                      EOF
                      chmod +x /usr/local/sbin/zerollm-firstboot-cleanup.sh

                      cat > /etc/systemd/system/zerollm-firstboot-cleanup.service <<'EOF'
                      [Unit]
                      Description=ZeroLLM first boot package cleanup
                      After=cloud-final.service amazon-ssm-agent.service
                      Wants=amazon-ssm-agent.service
                      ConditionPathExists=!/var/lib/zerollm/firstboot-cleanup.done

                      [Service]
                      Type=oneshot
                      ExecStart=/usr/local/sbin/zerollm-firstboot-cleanup.sh
                      ExecStartPost=/usr/bin/mkdir -p /var/lib/zerollm
                      ExecStartPost=/usr/bin/touch /var/lib/zerollm/firstboot-cleanup.done

                      [Install]
                      WantedBy=multi-user.target
                      EOF
                      systemctl enable zerollm-firstboot-cleanup.service

                      # Install CloudWatch agent for persistent log streaming
                      curl -sO https://s3.amazonaws.com/amazoncloudwatch-agent/ubuntu/amd64/latest/amazon-cloudwatch-agent.deb
                      dpkg -i amazon-cloudwatch-agent.deb
                      rm amazon-cloudwatch-agent.deb

                      # Install Docker
                      curl -fsSL https://get.docker.com | sh

                      # Install nvidia-container-toolkit so Docker can access the GPU
                      apt-get install -y nvidia-container-toolkit
                      nvidia-ctk runtime configure --runtime=docker
                      systemctl enable docker
                      systemctl start docker

                      # Pre-pull the llama.cpp server image so the first start is fast.
                      # server-cuda13 bundles CUDA libs — no compile step, no CPU arch mismatch.
                      # Pin the build so newly-supported GGUF architectures are reproducible.
                      docker pull ${LlamaCppDockerImage}
                      docker run --rm ${LlamaCppDockerImage} --version
                      docker run --rm ${LlamaCppDockerImage} --help 2>&1 | tee /tmp/llama-server-help.txt
                      grep -q -- 'draft-mtp' /tmp/llama-server-help.txt

                      # Models are downloaded from S3 at instance boot (not baked into the AMI).
                      # Stored on NVMe instance store to avoid EBS snapshot lazy-initialization
                      # (~33 MB/s). NVMe delivers ~4 GB/s read throughput for model loading.
                      mkdir -p /opt/dlami/nvme/models

                      cat > /etc/zerollm-model.env <<'EOF'
                      MODEL_NAME=
                      VLLM_ARGS=
                      S3_BUCKET=
                      S3_KEY=
                      EOF
                      install -d -m 0755 /opt/zerollm
                      cat > /opt/zerollm/start_vllm.sh <<'EOF'
                      #!/usr/bin/env bash
                      set -euo pipefail

                      # Log startup timing to coldstart log (streamed to CloudWatch on every boot).
                      log_ts() {
                        printf '%s coldstart:%s %s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$1" "${2:-}" | tee -a /var/log/zerollm-coldstart.log
                      }

                      source /etc/zerollm-model.env
                      if [[ -z "${!MODEL_NAME:-}" ]]; then
                        echo "MODEL_NAME is required in /etc/zerollm-model.env" >&2
                        exit 1
                      fi

                      # Map container path to NVMe host path.
                      model_file="${!MODEL_NAME#/opt/models}"
                      nvme_model="/opt/dlami/nvme/models${model_file}"

                      # On warm start (stop/start), NVMe is wiped and model is missing.
                      # Re-download from S3 if S3 credentials are available.
                      if [[ ! -f "$nvme_model" ]]; then
                        log_ts 'model_missing_from_nvme' "path=${nvme_model}"
                        if [[ -n "${!S3_BUCKET:-}" && -n "${!S3_KEY:-}" ]]; then
                          log_ts 'model_redownload_start' "bucket=${!S3_BUCKET} key=${!S3_KEY}"
                          mkdir -p /opt/dlami/nvme/models
                          aws s3 cp "s3://${!S3_BUCKET}/${!S3_KEY}" "$nvme_model" --no-progress
                          sync "$nvme_model"
                          log_ts 'model_redownload_done' "path=${nvme_model} size_bytes=$(stat -c%s "$nvme_model")"
                        else
                          echo "Model missing from NVMe and no S3 credentials available" >&2
                          exit 1
                        fi
                      else
                        log_ts 'model_on_nvme' "path=${nvme_model} size_bytes=$(stat -c%s "$nvme_model")"
                      fi

                      log_ts 'vllm_start' "model=${!MODEL_NAME}"
                      exec docker run --rm \
                        --gpus all \
                        --network host \
                        -v /opt/dlami/nvme/models:/opt/models \
                        ${LlamaCppDockerImage} \
                        -m "${!MODEL_NAME}" \
                        --host 0.0.0.0 --port 8000 \
                        --no-mmap \
                        ${!VLLM_ARGS:-}
                      EOF
                      chmod +x /opt/zerollm/start_vllm.sh
                      cat > /etc/systemd/system/vllm.service <<'EOF'
                      [Unit]
                      Description=ZeroLLM llama-server
                      After=network-online.target
                      Wants=network-online.target
                      [Service]
                      Type=simple
                      Restart=always
                      RestartSec=5
                      EnvironmentFile=/etc/zerollm-model.env
                      ExecStart=/opt/zerollm/start_vllm.sh
                      StandardOutput=append:/var/log/vllm.log
                      StandardError=append:/var/log/vllm.log
                      [Install]
                      WantedBy=multi-user.target
                      EOF
                      systemctl daemon-reload
                      echo "ZEROLLM_BOOTSTRAP_DONE" > /var/log/zerollm-bootstrap.done

  ZeroLLMImageRecipe:
    Type: AWS::ImageBuilder::ImageRecipe
    Properties:
      Name: !Sub zerollm-gpu-recipe-${Environment}
      Version: !Ref ImageVersion
      ParentImage: !Ref BaseAmiId
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 250
            VolumeType: gp3
            DeleteOnTermination: true
      Components:
        - ComponentArn: !Ref ZeroLLMSetupComponent

  ZeroLLMInfrastructureConfig:
    Type: AWS::ImageBuilder::InfrastructureConfiguration
    Properties:
      Name: !Sub zerollm-gpu-infra-${Environment}
      InstanceProfileName: !Ref ImageBuilderInstanceProfile
      InstanceTypes:
        - !Ref BuilderInstanceType
      SubnetId: !Ref BuilderSubnetId
      SecurityGroupIds:
        - !Ref BuilderSecurityGroupId
      TerminateInstanceOnFailure: true

  ZeroLLMDistributionConfig:
    Type: AWS::ImageBuilder::DistributionConfiguration
    Properties:
      Name: !Sub zerollm-gpu-dist-${Environment}
      Distributions:
        - Region: !Ref AWS::Region
          AmiDistributionConfiguration:
            Name: !Sub zerollm-gpu-{{ imagebuilder:buildDate }}
            Description: !Sub ZeroLLM GPU AMI (${Environment})
            AmiTags:
              Project: zerollm
              Environment: !Ref Environment

  ZeroLLMImagePipeline:
    Type: AWS::ImageBuilder::ImagePipeline
    Properties:
      Name: !Sub zerollm-gpu-pipeline-${Environment}
      Status: !Ref PipelineStatus
      ImageRecipeArn: !Ref ZeroLLMImageRecipe
      InfrastructureConfigurationArn: !Ref ZeroLLMInfrastructureConfig
      DistributionConfigurationArn: !Ref ZeroLLMDistributionConfig
      ImageTestsConfiguration:
        ImageTestsEnabled: false

  ZeroLLMLifecyclePolicy:
    Type: AWS::ImageBuilder::LifecyclePolicy
    Properties:
      Name: !Sub zerollm-ami-lifecycle-${Environment}
      Status: ENABLED
      ExecutionRole: !GetAtt ImageBuilderRole.Arn
      ResourceType: AMI_IMAGE
      ResourceSelection:
        Recipes:
          - Name: !Sub zerollm-gpu-recipe-${Environment}
            SemanticVersion: "x.x.x"
      PolicyDetails:
        - Action:
            Type: DELETE
          Filter:
            Type: COUNT
            Value: 2

Outputs:
  ImagePipelineArn:
    Description: ARN of the ZeroLLM Image Builder pipeline
    Value: !Ref ZeroLLMImagePipeline
  ImageRecipeArn:
    Value: !Ref ZeroLLMImageRecipe
