AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Diogenes - Personal LLM backend that scales to zero

Parameters:
  Environment:
    Type: String
    Default: dev
  AllowedEmails:
    Type: String
    Default: ""
    Description: Comma-separated list of allowed email addresses
  GoogleClientId:
    Type: String
    Default: ""
    Description: Google OAuth Client ID
  GpuAmiId:
    Type: String
    Default: ""
    Description: AMI ID for GPU instances (with vLLM pre-installed)
  GpuSubnetId:
    Type: String
    Default: ""
    Description: Subnet ID for GPU instances
  GpuVpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID for GPU instances (a security group is created by this stack)
  VllmApiKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: Shared secret required by vLLM (--api-key) and forwarded by the router
  HFTokenSecretArn:
    Type: String
    Default: ""
    Description: Optional Secrets Manager secret ARN containing HF_TOKEN for model sync downloads

Conditions:
  HasHFTokenSecret: !Not [!Equals [!Ref HFTokenSecretArn, ""]]

Globals:
  Function:
    Runtime: python3.12
    MemorySize: 256
    Timeout: 30
    Environment:
      Variables:
        INSTANCES_TABLE: !Ref InstancesTable
        MODELS_TABLE: !Ref ModelsTable
        API_KEYS_TABLE: !Ref ApiKeysTable
        ALLOWED_EMAILS: !Ref AllowedEmails
        GOOGLE_CLIENT_ID: !Ref GoogleClientId

Resources:
  # --- API Gateway ---
  DiogenesApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      Auth:
        DefaultAuthorizer: ApiLambdaAuthorizer
        Authorizers:
          ApiLambdaAuthorizer:
            AuthorizerPayloadFormatVersion: 2.0
            EnableSimpleResponses: true
            EnableFunctionDefaultPermissions: true
            FunctionArn: !GetAtt AuthorizerFunction.Arn
            Identity:
              Headers:
                - Authorization
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization

  # --- DynamoDB Tables ---
  InstancesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub diogenes-instances-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: instance_id
          AttributeType: S
        - AttributeName: model
          AttributeType: S
        - AttributeName: status
          AttributeType: S
      KeySchema:
        - AttributeName: instance_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: model-status-index
          KeySchema:
            - AttributeName: model
              KeyType: HASH
            - AttributeName: status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  ModelsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub diogenes-models-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: name
          AttributeType: S
      KeySchema:
        - AttributeName: name
          KeyType: HASH

  ApiKeysTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub diogenes-api-keys-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: key_hash
          AttributeType: S
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: key_hash
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: email-index
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # --- EventBridge (scale-down schedule) ---
  ScaleDownSchedule:
    Type: AWS::Events::Rule
    Properties:
      ScheduleExpression: rate(5 minutes)
      State: ENABLED
      Targets:
        - Arn: !GetAtt OrchestratorFunction.Arn
          Id: ScaleDownTarget
          Input: '{"source": "schedule", "action": "scale_down"}'

  ScaleDownPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref OrchestratorFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ScaleDownSchedule.Arn

  # --- EventBridge (check-health schedule) ---
  # Polls all 'starting' instances every minute so scale_up can return immediately
  # without blocking a Lambda invocation for the full cold-start duration.
  CheckHealthSchedule:
    Type: AWS::Events::Rule
    Properties:
      ScheduleExpression: rate(1 minute)
      State: ENABLED
      Targets:
        - Arn: !GetAtt OrchestratorFunction.Arn
          Id: CheckHealthTarget
          Input: '{"source": "schedule", "action": "check_health"}'

  CheckHealthPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref OrchestratorFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt CheckHealthSchedule.Arn

  # --- GPU Security Group ---
  GpuSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "Diogenes GPU instances (${Environment})"
      VpcId: !Ref GpuVpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "diogenes-gpu-${Environment}"

  # --- GPU Instance IAM ---
  ModelsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "diogenes-models-${Environment}-${AWS::AccountId}"

  GpuInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchLogsFullAccess
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: ModelsBucketRead
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub "arn:aws:s3:::diogenes-models-${Environment}-${AWS::AccountId}/*"

  GpuInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref GpuInstanceRole

  # --- Model Sync Pipeline ---
  ModelSyncRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ModelSyncAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/diogenes-model-sync-${Environment}"
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/diogenes-model-sync-${Environment}:*"
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub "arn:aws:s3:::diogenes-models-${Environment}-${AWS::AccountId}/*"
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !Sub "arn:aws:s3:::diogenes-models-${Environment}-${AWS::AccountId}"
              - Effect: Allow
                Action:
                  - dynamodb:DeleteItem
                  - dynamodb:PutItem
                  - dynamodb:Scan
                Resource: !GetAtt ModelsTable.Arn
              - !If
                - HasHFTokenSecret
                - Effect: Allow
                  Action:
                    - secretsmanager:GetSecretValue
                  Resource: !Ref HFTokenSecretArn
                - !Ref AWS::NoValue

  ModelSyncProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub "diogenes-model-sync-${Environment}"
      Description: Downloads configured GGUF models to S3 and seeds the models table
      ServiceRole: !GetAtt ModelSyncRole.Arn
      TimeoutInMinutes: 480
      Artifacts:
        Type: NO_ARTIFACTS
      Source:
        Type: NO_SOURCE
        BuildSpec: |
          version: 0.2
          phases:
            install:
              commands:
                - python3 -m pip install --upgrade boto3 "huggingface-hub[hf_xet]"
            build:
              commands:
                - test -n "$MODEL_SYNC_SCRIPT_S3_URI"
                - test -n "$MODEL_MANIFEST_S3_URI"
                - aws s3 cp "$MODEL_SYNC_SCRIPT_S3_URI" /tmp/seed_models.py
                - aws s3 cp "$MODEL_MANIFEST_S3_URI" /tmp/models.json
                - python3 /tmp/seed_models.py --manifest /tmp/models.json --upload --bucket "$MODELS_BUCKET" --table-name "$MODELS_TABLE" --region "$AWS_DEFAULT_REGION"
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_MEDIUM
        Image: aws/codebuild/standard:7.0
        EnvironmentVariables:
          - Name: MODELS_BUCKET
            Type: PLAINTEXT
            Value: !Ref ModelsBucket
          - Name: MODELS_TABLE
            Type: PLAINTEXT
            Value: !Ref ModelsTable
          - !If
            - HasHFTokenSecret
            - Name: HF_TOKEN
              Type: SECRETS_MANAGER
              Value: !Ref HFTokenSecretArn
            - !Ref AWS::NoValue

  # --- Lambda Functions ---
  OrchestratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: control_plane.backends.aws.handlers.orchestrator_handler
      CodeUri: ./
      Timeout: 60
      MemorySize: 256
      Environment:
        Variables:
          GPU_AMI_ID: !Ref GpuAmiId
          GPU_SUBNET_ID: !Ref GpuSubnetId
          GPU_SECURITY_GROUP_ID: !GetAtt GpuSecurityGroup.GroupId
          GPU_INSTANCE_PROFILE_ARN: !GetAtt GpuInstanceProfile.Arn
          VLLM_API_KEY: !Ref VllmApiKey
          MODELS_BUCKET: !Ref ModelsBucket
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref InstancesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ModelsTable
        - Statement:
            - Effect: Allow
              Action:
                - ec2:RunInstances
                - ec2:TerminateInstances
                - ec2:DescribeInstances
                - ec2:CreateTags
              Resource: "*"
        - Statement:
            - Effect: Allow
              Action: iam:PassRole
              Resource: !GetAtt GpuInstanceRole.Arn

  RouterFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: control_plane.backends.aws.handlers.router_handler
      CodeUri: ./
      Timeout: 120
      Environment:
        Variables:
          ORCHESTRATOR_FUNCTION_NAME: !Ref OrchestratorFunction
          VLLM_API_KEY: !Ref VllmApiKey
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref InstancesTable
        - DynamoDBReadPolicy:
            TableName: !Ref ModelsTable
        - LambdaInvokePolicy:
            FunctionName: !Ref OrchestratorFunction
      Events:
        ChatCompletions:
          Type: HttpApi
          Properties:
            ApiId: !Ref DiogenesApi
            Path: /v1/chat/completions
            Method: POST
        Completions:
          Type: HttpApi
          Properties:
            ApiId: !Ref DiogenesApi
            Path: /v1/completions
            Method: POST
        Models:
          Type: HttpApi
          Properties:
            ApiId: !Ref DiogenesApi
            Path: /v1/models
            Method: GET

  AuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: control_plane.backends.aws.handlers.authorizer_handler
      CodeUri: ./
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ApiKeysTable

  KeysFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: control_plane.backends.aws.handlers.keys_handler
      CodeUri: ./
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ApiKeysTable
      Events:
        CreateKey:
          Type: HttpApi
          Properties:
            ApiId: !Ref DiogenesApi
            Path: /api/keys
            Method: POST
        ListKeys:
          Type: HttpApi
          Properties:
            ApiId: !Ref DiogenesApi
            Path: /api/keys
            Method: GET
        DeleteKey:
          Type: HttpApi
          Properties:
            ApiId: !Ref DiogenesApi
            Path: /api/keys/{key_id}
            Method: DELETE

  ClusterStateFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: control_plane.backends.aws.handlers.cluster_handler
      CodeUri: ./
      Environment:
        Variables:
          ORCHESTRATOR_FUNCTION_NAME: !Ref OrchestratorFunction
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref InstancesTable
        - DynamoDBReadPolicy:
            TableName: !Ref ModelsTable
        - LambdaInvokePolicy:
            FunctionName: !Ref OrchestratorFunction
      Events:
        GetCluster:
          Type: HttpApi
          Properties:
            ApiId: !Ref DiogenesApi
            Path: /api/cluster
            Method: GET
        ScaleCluster:
          Type: HttpApi
          Properties:
            ApiId: !Ref DiogenesApi
            Path: /api/cluster/scale
            Method: POST

Outputs:
  ApiUrl:
    Description: API Gateway URL
    Value: !Sub "https://${DiogenesApi}.execute-api.${AWS::Region}.amazonaws.com"
  OrchestratorFunctionName:
    Value: !Ref OrchestratorFunction
  ModelsBucketName:
    Description: S3 bucket used for model files downloaded by GPU instances at boot
    Value: !Ref ModelsBucket
  ModelSyncProjectName:
    Description: CodeBuild project that syncs model manifest entries into S3 and DynamoDB
    Value: !Ref ModelSyncProject
