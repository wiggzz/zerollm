name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: uv sync --extra dev --extra upload

      - name: Check shell scripts
        run: bash -n scripts/*.sh ami/imagebuilder.sh

      - name: Check streaming router syntax
        run: node --check control_plane/backends/aws/streaming_router.js

      - name: Run unit tests
        run: uv run --no-sync pytest tests/unit/ -q
